<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Daily Forge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <script src="https://cdn.jsdelivr.net/npm/dexie@3/dist/dexie.min.js"></script>

<body>
  <nav class="nav">
    <button class="nav-tab" data-tab="why">Why</button>
    <button class="nav-tab active" data-tab="today">Today</button>
    <button class="nav-tab" data-tab="log">Log</button>
    <button class="nav-tab" data-tab="export">Export</button>
  </nav>

  <div id="view-why" class="view"></div>
  <div id="view-today" class="view active"></div>
  <div id="view-log" class="view"></div>

  <script src="app.js"></script>

</html>
